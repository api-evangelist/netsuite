# ─── Inventory and Supply Chain ────────────────────────────────────────────────

"""
Inventory item (product or service).
"""
type InventoryItem implements Node {
  id: ID!
  internalId: String!
  externalId: String
  itemId: String
  displayName: String
  description: String
  itemType: String
  upcCode: String
  isInactive: Boolean
  isTaxable: Boolean
  cost: Float
  salesPrice: Float
  quantityOnHand: Float
  quantityOnOrder: Float
  quantityAvailable: Float
  reorderPoint: Float
  preferredStockLevel: Float
  purchaseUnit: String
  saleUnit: String
  stockUnit: String
  incomeAccount: Account
  cogsAccount: Account
  assetAccount: Account
  taxSchedule: TaxCode
  priceLevel: PriceLevel
  department: Department
  location: Location
  subsidiary: Subsidiary
  inventoryDetail: [InventoryDetail]
  bomComponents: [BOMComponent]
  customFields: [CustomField]
}

"""
Inventory quantity at a specific location/bin.
"""
type InventoryDetail {
  id: ID!
  item: InventoryItem
  location: InventoryLocation
  lotNumber: String
  serialNumber: String
  expirationDate: Date
  quantityOnHand: Float
  quantityAvailable: Float
