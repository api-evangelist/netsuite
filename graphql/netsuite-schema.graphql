"""
Oracle NetSuite GraphQL Schema
Conceptual schema derived from the SuiteTalk REST Web Services API,
REST Record API, SuiteAnalytics Connect, and SuiteQL query layer.
Source: https://docs.oracle.com/en/cloud/saas/netsuite/ns-online-help/book_1559132836.html
"""

# ─── Scalars ──────────────────────────────────────────────────────────────────

scalar Date
scalar DateTime
scalar JSON

# ─── Enums ────────────────────────────────────────────────────────────────────

enum TransactionType {
  INVOICE
  BILL
  SALES_ORDER
  PURCHASE_ORDER
  ESTIMATE
  CREDIT_MEMO
  VENDOR_CREDIT
  CHECK
  DEPOSIT
  JOURNAL_ENTRY
  ITEM_FULFILLMENT
  ITEM_RECEIPT
  WORK_ORDER
}

enum AccountType {
  ACCOUNTS_PAYABLE
  ACCOUNTS_RECEIVABLE
  BANK
  COST_OF_GOODS_SOLD
  CREDIT_CARD
  DEFERRED_EXPENSE
  DEFERRED_REVENUE
  EQUITY
  EXPENSE
  FIXED_ASSET
  INCOME
  LONG_TERM_LIABILITY
  NON_POSTING
  OTHER_ASSET
  OTHER_CURRENT_ASSET
  OTHER_CURRENT_LIABILITY
  OTHER_EXPENSE
  OTHER_INCOME
  STATISTICAL
  UNBILLED_RECEIVABLE
}

enum EntityType {
  CUSTOMER
  VENDOR
  EMPLOYEE
  CONTACT
  PARTNER
  OTHER_NAME
}

enum ScriptType {
  CLIENT
  USER_EVENT
  SCHEDULED
  SUITELET
  RESTLET
  PORTLET
  WORKFLOW_ACTION
  MAP_REDUCE
  BUNDLE_INSTALLATION
  MASS_UPDATE
}

enum WorkOrderStatus {
  PLANNED
  RELEASED
  IN_PROCESS
  COMPLETED
  CANCELLED
}

enum RevenueRecognitionStatus {
  PENDING
  IN_PROGRESS
  COMPLETED
}

# ─── Interfaces ───────────────────────────────────────────────────────────────

interface Node {
  id: ID!
  internalId: String!
  externalId: String
}

interface Transaction {
  id: ID!
  internalId: String!
  tranDate: Date
  tranId: String
  entity: Entity
  memo: String
  status: String
  currency: Currency
  exchangeRate: Float
  department: Department
  location: Location
  classification: Classification
  subsidiary: Subsidiary
  customFields: [CustomField]
}

# ─── Core Platform Types ───────────────────────────────────────────────────────

"""
Base entity representing any stakeholder in NetSuite (customer, vendor, employee, contact).
"""
type Entity implements Node {
  id: ID!
  internalId: String!
  externalId: String
  entityId: String
  entityType: EntityType
  companyName: String
  firstName: String
  lastName: String
  email: String
  phone: String
  altPhone: String
  fax: String
  defaultAddress: String
  isInactive: Boolean
  subsidiary: Subsidiary
  currency: Currency
  customFields: [CustomField]
}

"""
Customer record in NetSuite.
"""
type Customer implements Node {
  id: ID!
  internalId: String!
  externalId: String
  entityId: String
  companyName: String
  firstName: String
  lastName: String
  email: String
  phone: String
  altPhone: String
  fax: String
  defaultAddress: String
  creditLimit: Float
  balance: Float
  daysOverdue: Int
  isInactive: Boolean
  isPerson: Boolean
  status: String
  salesRep: Employee
  category: String
  terms: PaymentTerm
  subsidiary: Subsidiary
  currency: Currency
  priceLevel: PriceLevel
  taxItem: TaxItem
  department: Department
  location: Location
  contacts: [Contact]
  transactions: [Transaction]
  customFields: [CustomField]
}

"""
Vendor record in NetSuite.
"""
type Vendor implements Node {
  id: ID!
  internalId: String!
  externalId: String
  entityId: String
  companyName: String
  firstName: String
  lastName: String
  email: String
  phone: String
  altPhone: String
  fax: String
  defaultAddress: String
  creditLimit: Float
  balance: Float
  isInactive: Boolean
  isPerson: Boolean
  terms: PaymentTerm
  subsidiary: Subsidiary
  currency: Currency
  taxItem: TaxItem
  department: Department
  location: Location
  contacts: [Contact]
  transactions: [Transaction]
  customFields: [CustomField]
}

"""
Employee record in NetSuite.
"""
type Employee implements Node {
  id: ID!
  internalId: String!
  externalId: String
  entityId: String
  firstName: String
  lastName: String
  email: String
  phone: String
  mobilePhone: String
  title: String
  department: Department
  location: Location
  subsidiary: Subsidiary
  supervisor: Employee
  isInactive: Boolean
  hireDate: Date
  releaseDate: Date
  role: Role
  customFields: [CustomField]
}

"""
Contact record in NetSuite, associated with a customer, vendor, or partner.
"""
type Contact implements Node {
  id: ID!
  internalId: String!
  externalId: String
  entityId: String
  firstName: String
  lastName: String
  email: String
  phone: String
  mobilePhone: String
  title: String
  company: Entity
  isInactive: Boolean
  subsidiary: Subsidiary
  customFields: [CustomField]
}

# ─── Financial Types ───────────────────────────────────────────────────────────

"""
Chart of accounts entry.
"""
type Account implements Node {
  id: ID!
  internalId: String!
  externalId: String
  acctNumber: String
  acctName: String
  acctType: AccountType
  description: String
  currency: Currency
  parent: Account
  subAccounts: [Account]
  isInactive: Boolean
  subsidiary: Subsidiary
  department: Department
  location: Location
  classification: Classification
  customFields: [CustomField]
}

"""
Fiscal accounting period.
"""
type AccountingPeriod implements Node {
  id: ID!
  internalId: String!
  externalId: String
  periodName: String
  startDate: Date
  endDate: Date
  isClosed: Boolean
  isLocked: Boolean
  isQuarter: Boolean
  isYear: Boolean
  parent: AccountingPeriod
  fiscalCalendar: String
}

"""
Journal entry header.
"""
type JournalEntry implements Node & Transaction {
  id: ID!
  internalId: String!
  externalId: String
  tranDate: Date
  tranId: String
  entity: Entity
  memo: String
  status: String
  currency: Currency
  exchangeRate: Float
  department: Department
  location: Location
  classification: Classification
  subsidiary: Subsidiary
  accountingPeriod: AccountingPeriod
  isReversal: Boolean
  reversalDate: Date
  lines: [JournalLine]
  customFields: [CustomField]
}

"""
Individual debit or credit line on a journal entry.
"""
type JournalLine {
  id: ID!
  lineId: Int
  account: Account
  debit: Float
  credit: Float
  memo: String
  entity: Entity
  department: Department
  location: Location
  classification: Classification
  customFields: [CustomField]
}

"""
Currency definition.
"""
type Currency implements Node {
  id: ID!
  internalId: String!
  externalId: String
  name: String
  symbol: String
  exchangeRate: Float
  currencyPrecision: Int
  isInactive: Boolean
  isBaseCurrency: Boolean
}

"""
Exchange rate between two currencies for a given period.
"""
type ExchangeRate {
  id: ID!
  fromCurrency: Currency
  toCurrency: Currency
  exchangeRate: Float
  effectiveDate: Date
}

"""
Revenue recognition schedule.
"""
type RevenueRecognition implements Node {
  id: ID!
  internalId: String!
  externalId: String
  revenueElement: String
  startDate: Date
  endDate: Date
  recognitionStatus: RevenueRecognitionStatus
  totalAmount: Float
  recognizedAmount: Float
  deferredAmount: Float
  revenueArrangement: String
  revenueRecognitionRule: String
  subsidiary: Subsidiary
  customFields: [CustomField]
}

"""
Advanced billing schedule attached to a subscription or project.
"""
type AdvancedBilling implements Node {
  id: ID!
  internalId: String!
  externalId: String
  customer: Customer
  startDate: Date
  endDate: Date
  billingSchedule: String
  frequency: String
  nextBillingDate: Date
  totalAmount: Float
  customFields: [CustomField]
}

"""
Contract header (subscription or service agreement).
"""
type Contract implements Node {
  id: ID!
  internalId: String!
  externalId: String
  contractNumber: String
  customer: Customer
  startDate: Date
  endDate: Date
  status: String
  totalValue: Float
  billingSchedule: String
  lines: [ContractLine]
  revenueRecognition: RevenueRecognition
  subsidiary: Subsidiary
  customFields: [CustomField]
}

"""
Line item on a contract.
"""
type ContractLine {
  id: ID!
  lineId: Int
  item: InventoryItem
  quantity: Float
  rate: Float
  amount: Float
  startDate: Date
  endDate: Date
  revenueRecognitionRule: String
}

"""
Revenue line associated with a transaction or contract.
"""
type Revenue implements Node {
  id: ID!
  internalId: String!
  externalId: String
  transaction: Transaction
  account: Account
  amount: Float
  recognitionDate: Date
  subsidiary: Subsidiary
}

