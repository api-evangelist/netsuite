  salesOrders(limit: Int, offset: Int, customerId: ID, status: String): [SalesOrder]

  estimate(id: ID!): Estimate
  estimates(limit: Int, offset: Int, customerId: ID): [Estimate]

  creditMemo(id: ID!): CreditMemo
  creditMemos(limit: Int, offset: Int, customerId: ID): [CreditMemo]

