  quantityCommitted: Float
}

"""
Physical or virtual inventory location (warehouse, bin, etc.).
"""
type InventoryLocation implements Node {
  id: ID!
  internalId: String!
  externalId: String
  name: String
  isInactive: Boolean
  parent: InventoryLocation
  subsidiary: Subsidiary
  includeChildren: Boolean
}

"""
Inventory (current snapshot across all items and locations).
"""
type Inventory {
  id: ID!
  item: InventoryItem
  location: InventoryLocation
  quantityOnHand: Float
  quantityAvailable: Float
  quantityOnOrder: Float
  quantityCommitted: Float
  averageCost: Float
  lastPurchasePrice: Float
}

"""
Item fulfillment — shipping items against a sales order.
"""
type ItemFulfillment implements Node & Transaction {
  id: ID!
