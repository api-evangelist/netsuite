  location: Location
  classification: Classification
  subsidiary: Subsidiary
  salesOrder: SalesOrder
  shipDate: Date
  shipMethod: String
  trackingNumbers: [String]
  lines: [TransactionLine]
  customFields: [CustomField]
}

"""
Item receipt — receiving items against a purchase order.
"""
type ItemReceipt implements Node & Transaction {
  id: ID!
  internalId: String!
  externalId: String
  tranDate: Date
