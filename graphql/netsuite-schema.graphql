  reportId: String
  title: String
  reportType: String
  layout: JSON
  isPublic: Boolean
  owner: Employee
}

"""
Role definition controlling record-level access.
"""
type Role implements Node {
  id: ID!
  internalId: String!
  externalId: String
  name: String
  isInactive: Boolean
  isReadOnly: Boolean
  centerType: String
  permissions: [Permission]
  subsidiary: Subsidiary
}

"""
Permission entry within a role.
"""
type Permission {
  id: ID!
  feature: String
  permissionLevel: String
  restriction: String
}

"""
SuiteScript script record.
"""
type Script implements Node {
  id: ID!
  internalId: String!
  externalId: String
  name: String
  scriptId: String
  scriptType: ScriptType
  description: String
  scriptFile: String
  apiVersion: String
  owner: Employee
  isInactive: Boolean
  deployments: [ScriptDeployment]
  customFields: [CustomField]
}

"""
Deployment of a SuiteScript to a specific record type or schedule.
"""
type ScriptDeployment implements Node {
  id: ID!
  internalId: String!
  externalId: String
  script: Script
  deploymentId: String
  status: String
  isDeployed: Boolean
  executeAs: Employee
  recordType: String
  eventType: String
  runAsRole: Role
  logLevel: String
  customFields: [CustomField]
}

"""
SuiteFlow workflow definition.
"""
type WorkflowDefinition implements Node {
  id: ID!
  internalId: String!
  externalId: String
  name: String
  scriptId: String
  recordType: RecordType
  isOrdered: Boolean
  releaseStatus: String
  initCondition: String
  owner: Employee
  isInactive: Boolean
  customFields: [CustomField]
}

"""
External integration record (OAuth 2.0 / Token-Based Auth client).
"""
type Integration implements Node {
  id: ID!
  internalId: String!
  externalId: String
  name: String
  state: String
  authorizationCodeGrant: Boolean
  scopeGetAll: Boolean
  scopeRestWebServices: Boolean
  scopeSuiteAnalytics: Boolean
  isInactive: Boolean
  owner: Employee
}

