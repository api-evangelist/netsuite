  locations: [Location]

  classification(id: ID!): Classification
  classifications: [Classification]

  subsidiary(id: ID!): Subsidiary
  subsidiaries: [Subsidiary]

  project(id: ID!): Project
  projects(limit: Int, offset: Int, customerId: ID): [Project]

  # Platform
  customRecord(id: ID!, recordTypeId: ID!): CustomRecord
  customRecords(recordTypeId: ID!, limit: Int, offset: Int): [CustomRecord]

  recordType(id: ID!): RecordType
  recordTypes: [RecordType]

  savedSearch(id: ID!): SavedSearch
