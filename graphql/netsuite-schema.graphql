  checks(limit: Int, offset: Int, startDate: Date, endDate: Date): [Check]

  deposit(id: ID!): Deposit
  deposits(limit: Int, offset: Int, startDate: Date, endDate: Date): [Deposit]

  # Inventory
  inventoryItem(id: ID!): InventoryItem
  inventoryItems(limit: Int, offset: Int, query: String): [InventoryItem]

