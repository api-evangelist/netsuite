aid: netsuite
name: Oracle NetSuite
description: Oracle NetSuite is a cloud-based business management suite that combines
  ERP, financials, CRM, inventory, supply chain, ecommerce, and human capital management
  into a single platform for mid-market and enterprise companies. NetSuite's SuiteCloud
  platform exposes both REST web services (SuiteTalk REST, with OpenAPI 3.0 metadata,
  SuiteQL queries, and CRUD on standard and custom records) and SOAP web services
  (SuiteTalk SOAP), plus the RESTlets framework for exposing custom server-side SuiteScript
  as REST endpoints.
type: Index
